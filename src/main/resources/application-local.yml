spring:
  datasource:
    url: ${RIPPLE_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/ripple?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${RIPPLE_DATASOURCE_USERNAME:root}
    password: ${RIPPLE_DATASOURCE_PASSWORD:}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 2
      min-idle: 2
      max-active: 10
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      filters: stat,wall
      stat-view-servlet:
        login-username: ${RIPPLE_DRUID_USERNAME:admin}
        login-password: ${RIPPLE_DRUID_PASSWORD:admin}
        reset-enable: false
        url-pattern: /druid/*
      web-stat-filter:
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
  redis:
    host: ${RIPPLE_REDIS_HOST:127.0.0.1}
    port: ${RIPPLE_REDIS_PORT:6379}
    password: ${RIPPLE_REDIS_PASSWORD:}
    database: ${RIPPLE_REDIS_DATABASE:0}
  kafka:
    bootstrap-servers: ${RIPPLE_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    consumer:
      group-id: ${RIPPLE_KAFKA_CONSUMER_GROUP:ripple-local}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      batch-size: 65536
      buffer-memory: 524288

eureka:
  client:
    enabled: ${RIPPLE_EUREKA_ENABLED:false}
    register-with-eureka: false
    fetch-registry: false
