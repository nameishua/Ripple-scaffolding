spring:
  datasource:
    url: ${RIPPLE_DATASOURCE_URL}
    username: ${RIPPLE_DATASOURCE_USERNAME}
    password: ${RIPPLE_DATASOURCE_PASSWORD}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: ${RIPPLE_DRUID_INITIAL_SIZE:5}
      min-idle: ${RIPPLE_DRUID_MIN_IDLE:5}
      max-active: ${RIPPLE_DRUID_MAX_ACTIVE:30}
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      filters: stat,wall
      stat-view-servlet:
        login-username: ${RIPPLE_DRUID_USERNAME}
        login-password: ${RIPPLE_DRUID_PASSWORD}
        reset-enable: false
        url-pattern: /druid/*
  redis:
    host: ${RIPPLE_REDIS_HOST}
    port: ${RIPPLE_REDIS_PORT:6379}
    password: ${RIPPLE_REDIS_PASSWORD:}
    database: ${RIPPLE_REDIS_DATABASE:0}
  kafka:
    bootstrap-servers: ${RIPPLE_KAFKA_BOOTSTRAP_SERVERS}

eureka:
  client:
    enabled: ${RIPPLE_EUREKA_ENABLED:false}
    service-url:
      defaultZone: ${RIPPLE_EUREKA_DEFAULT_ZONE:http://127.0.0.1:8881/eureka/}
  instance:
    prefer-ip-address: true
