spring:
  datasource:
    url: ${RIPPLE_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/ripple?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${RIPPLE_DATASOURCE_USERNAME:root}
    password: ${RIPPLE_DATASOURCE_PASSWORD:root}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: ${RIPPLE_DRUID_INITIAL_SIZE:5}
      min-idle: ${RIPPLE_DRUID_MIN_IDLE:5}
      max-active: ${RIPPLE_DRUID_MAX_ACTIVE:30}
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      filters: stat,wall
      stat-view-servlet:
        login-username: ${RIPPLE_DRUID_USERNAME:admin}
        login-password: ${RIPPLE_DRUID_PASSWORD:admin}
        reset-enable: false
        url-pattern: /druid/*
