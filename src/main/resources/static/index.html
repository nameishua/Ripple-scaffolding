<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="login-container" class="container">
            <div class="login-box">
                <h1>Ripple管理系统</h1>
                <form id="login-form">
                    <div class="form-group">
                        <label for="account">账号</label>
                        <input type="text" id="account" name="account" required placeholder="请输入账号">
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" required placeholder="请输入密码">
                    </div>
                    <button type="submit" class="btn btn-primary">登录</button>
                </form>
                <p id="login-message" class="message"></p>
            </div>
        </div>

        <div id="main-container" class="container" style="display: none;">
            <header class="header">
                <h1>Ripple管理系统</h1>
                <div class="user-info">
                    <span id="user-name"></span>
                    <button id="logout-btn" class="btn btn-logout">退出</button>
                </div>
            </header>
            <nav class="nav">
                <ul>
                    <li><a href="#" class="nav-link active" data-page="user">用户管理</a></li>
                    <li><a href="#" class="nav-link" data-page="sequence">序列号管理</a></li>
                </ul>
            </nav>
            <main class="main-content">
                <div id="user-page" class="page active">
                    <div class="toolbar">
                        <button id="add-user-btn" class="btn btn-primary">添加用户</button>
                        <button id="refresh-user-btn" class="btn">刷新</button>
                    </div>
                    <div class="table-container">
                        <table id="user-table" class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>姓名</th>
                                    <th>账号</th>
                                    <th>年龄</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="user-table-body">
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination">
                        <button id="prev-page" class="btn">上一页</button>
                        <span id="page-info">第 1 页</span>
                        <button id="next-page" class="btn">下一页</button>
                    </div>
                </div>
                <div id="sequence-page" class="page">
                    <div class="toolbar">
                        <button id="refresh-sequence-btn" class="btn">刷新</button>
                    </div>
                    <div class="table-container">
                        <table id="sequence-table" class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>类型</th>
                                    <th>序列号</th>
                                    <th>创建时间</th>
                                </tr>
                            </thead>
                            <tbody id="sequence-table-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>

        <div id="user-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">添加用户</h2>
                    <span class="close">&times;</span>
                </div>
                <form id="user-form">
                    <div class="form-group">
                        <label for="user-name">姓名</label>
                        <input type="text" id="user-name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="user-account">账号</label>
                        <input type="text" id="user-account" name="account" required>
                    </div>
                    <div class="form-group">
                        <label for="user-password">密码</label>
                        <input type="password" id="user-password" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="user-age">年龄</label>
                        <input type="number" id="user-age" name="age" required min="1">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn cancel-btn">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
